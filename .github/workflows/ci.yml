# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────────────
# Continuous integration for the AMT Ontology project.
#
# Three guarantees are enforced on every push and PR:
#   1. ruff lint + format check pass
#   2. the full test suite passes (structural + SHACL)
#   3. dist/ matches what `make dist` produces from the current views
#
# Test runs cover the project's lower (3.10) and upper (3.12) supported
# Python versions so a regression on either trips CI.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: tests (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: install (editable + dev + reasoner extras)
        run: python -m pip install -e ".[dev,reasoner]"

      - name: ruff lint
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: unit tests
        run: python -m unittest discover -s tests -v

      - name: dist/ matches current ontology (CSVs + amt-ontology.owl)
        # ``make dist`` regenerates three kinds of artefact:
        #   * ``dist/imts_*.csv`` from the views (via app.view_csv)
        #   * ``dist/amt-ontology.owl`` — the merged RDF/XML (via app.merge)
        #   * ``dist/AMT Taxonomy - Product Interest Category.xlsx`` (via
        #     app.view_xlsx)
        #
        # The CSV exporter and the OWL merger are content-idempotent: if
        # the TTL state hasn't changed semantically, the files are left
        # untouched, so a non-empty ``git diff`` on those means a real
        # ontology change went into the PR without the matching dist/
        # refresh.
        #
        # The xlsx exporter (app.view_xlsx) IS deterministic per-machine
        # but is NOT cross-platform byte-stable — openpyxl + zlib emit
        # slightly different bytes between Windows (typical local dev)
        # and Linux (CI). Forcing binary equality across platforms would
        # mean either pinning openpyxl/zlib build options globally or
        # rewriting the entire zip from scratch, neither of which adds
        # real value: the xlsx's *semantic* equality with the resource
        # workbook is already guarded by
        # ``tests/test_xlsx_export.py::TestProductInterestCategoryXlsx``,
        # which runs in the previous step and covers sheet structure,
        # field values, Tier 3 leaves, and approval-status lookups.
        # We therefore exclude the xlsx from this binary diff check.
        #
        # The semantic OWL check (graph isomorphism) is also asserted by
        # ``tests/test_merge.py::TestMergeSnapshotAgreement``.
        run: |
          make dist
          if ! git diff --exit-code -- 'dist/' ':(exclude)dist/*.xlsx'; then
            echo "::error::dist/ is stale — run 'make dist' locally and commit."
            exit 1
          fi
